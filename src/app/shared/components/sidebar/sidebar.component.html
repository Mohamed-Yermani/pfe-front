<aside
  class="z-30 inset-y-0 left-0 w-64 bg-white text-slate-600 transform lg:translate-x-0 lg:sticky lg:top-0 lg:h-screen transition-transform duration-200 ease-in-out flex flex-col justify-between border-r border-slate-200"
  [class.translate-x-0]="isOpen()"
  [class.-translate-x-full]="!isOpen()">

  <div>
    <!-- Logo -->
    <div class="flex items-center gap-3 px-6 pt-8 pb-6 border-b border-slate-200">
      <div class="w-10 h-10 bg-emerald-50 rounded-lg flex items-center justify-center p-1 shrink-0">
        <svg viewBox="0 0 100 100" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="48" fill="#0b7e3f" />
          <circle cx="50" cy="50" r="40" fill="white" />
          <circle cx="50" cy="24" r="5" fill="#0b7e3f" />
          <path d="M50 32 L50 82" stroke="#0b7e3f" stroke-width="8" stroke-linecap="round" />
          <path d="M22 45 C20 30 50 20 82 45 C95 60 75 80 50 85 C30 85 10 70 15 50" fill="none" stroke="#8dc63f" stroke-width="6" stroke-linecap="round" />
          <circle cx="36" cy="48" r="4" fill="#0b7e3f" />
          <path d="M36 55 L36 75" stroke="#0b7e3f" stroke-width="6" stroke-linecap="round" />
          <circle cx="64" cy="48" r="4" fill="#0b7e3f" />
          <path d="M64 55 L64 75" stroke="#0b7e3f" stroke-width="6" stroke-linecap="round" />
        </svg>
      </div>
      <div class="leading-tight">
        <p class="text-slate-900 text-sm font-bold tracking-tight">C.N.S.S</p>
        <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Portail Officiel</p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="mt-6 px-3 space-y-1">

      <a routerLink="/dashboard"
         routerLinkActive="bg-emerald-50 text-emerald-700 border-emerald-600"
         [routerLinkActiveOptions]="{ exact: true }"
         matTooltip="Vue d'ensemble de votre espace"
         matTooltipPosition="right"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold border-l-4 border-transparent text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
        <mat-icon style="font-size:20px;width:20px;height:20px;">dashboard</mat-icon>
        Tableau de bord
      </a>

      <a routerLink="/dossiers"
         routerLinkActive="bg-emerald-50 text-emerald-700 border-emerald-600"
         matTooltip="Consulter et suivre vos dossiers"
         matTooltipPosition="right"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold border-l-4 border-transparent text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
        <mat-icon style="font-size:20px;width:20px;height:20px;">folder</mat-icon>
        Mes Dossiers
      </a>

      @if (isAgent()) {
        <a routerLink="/dossiers/validation"
           routerLinkActive="bg-emerald-50 text-emerald-700 border-emerald-600"
           matTooltip="File d'attente des dossiers à valider"
           matTooltipPosition="right"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold border-l-4 border-transparent text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
          <mat-icon style="font-size:20px;width:20px;height:20px;">fact_check</mat-icon>
          Validation
        </a>
      }

      @if (isAgentCNSS() || isAdmin()) {
        <a routerLink="/agent/all-dossiers"
           routerLinkActive="bg-emerald-50 text-emerald-700 border-emerald-600"
           matTooltip="Vue globale de tous les dossiers"
           matTooltipPosition="right"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold border-l-4 border-transparent text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
          <mat-icon style="font-size:20px;width:20px;height:20px;">inventory_2</mat-icon>
          Tous les Dossiers
        </a>
      }

      @if (isAdmin()) {
        <a routerLink="/admin/agents"
           routerLinkActive="bg-emerald-50 text-emerald-700 border-emerald-600"
           matTooltip="Gérer les comptes agents"
           matTooltipPosition="right"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold border-l-4 border-transparent text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
          <mat-icon style="font-size:20px;width:20px;height:20px;">groups</mat-icon>
          Gestion Agents
        </a>
      }

      <a routerLink="/profile"
         routerLinkActive="bg-emerald-50 text-emerald-700 border-emerald-600"
         matTooltip="Vos informations personnelles"
         matTooltipPosition="right"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold border-l-4 border-transparent text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
        <mat-icon style="font-size:20px;width:20px;height:20px;">person</mat-icon>
        Mon Profil
      </a>
    </nav>
  </div>

  <!-- Footer -->
  <div class="px-3 pb-6">
    <button
      (click)="logout()"
      matTooltip="Se déconnecter de votre session"
      matTooltipPosition="right"
      class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-semibold text-red-600 hover:bg-red-50 transition-colors">
      <mat-icon style="font-size:20px;width:20px;height:20px;">logout</mat-icon>
      Déconnexion
    </button>

    <p class="text-[10px] text-slate-400 font-medium text-center mt-4 pt-4 border-t border-slate-200">
      République Tunisienne — CNSS
    </p>
  </div>
</aside>
